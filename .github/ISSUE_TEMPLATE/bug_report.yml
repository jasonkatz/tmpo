name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below so we can reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this behavior?
      placeholder: |
        1. Run `tmpo run --task "..." --repo org/repo`
        2. Wait for the workflow to reach the review step
        3. See error in logs
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include error messages or log output if available.
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      description: e.g. macOS 15.2, Ubuntu 24.04
    validations:
      required: true

  - type: input
    id: tmpo-version
    attributes:
      label: Tmpo version
      description: Output of `tmpo --version`
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context, screenshots, or log output.
    validations:
      required: false
