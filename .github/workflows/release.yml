name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-cli:
    name: Build CLI (${{ matrix.target }})
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: tmpo-darwin-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: tmpo-darwin-x64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: tmpo-linux-x64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: tmpo-linux-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      # CLI embeds client/dist/index.html via include_bytes! at compile time.
      - name: Build client
        working-directory: client
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build CLI
        working-directory: cli
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: cp cli/target/${{ matrix.target }}/release/tmpo ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  build-daemon:
    # Build each target on its matching OS. Bun's --compile can cross-compile
    # for the JS target, but transitive deps include native .node modules
    # (cbor-extract via @vercel/queue) whose platform-specific files are only
    # installed by bun on the matching host. Building each target on a host
    # that matches its OS ensures the correct .node file is bundled.
    name: Build Daemon (${{ matrix.target }})
    strategy:
      matrix:
        include:
          - target: bun-darwin-arm64
            os: macos-latest
            artifact: tmpod-darwin-arm64
          - target: bun-darwin-x64
            os: macos-13
            artifact: tmpod-darwin-x64
          - target: bun-linux-x64
            os: ubuntu-latest
            artifact: tmpod-linux-x64
          - target: bun-linux-arm64
            os: ubuntu-24.04-arm
            artifact: tmpod-linux-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install server dependencies
        working-directory: server
        run: bun install

      # bun install runs the postinstall script that patches @workflow/world-local
      # for bun-compile compatibility; re-run defensively in case postinstall was
      # skipped (e.g. when running with --ignore-scripts in a future change).
      - name: Patch @workflow/world-local for bun-compile
        working-directory: server
        run: node scripts/patch-wdk.mjs

      - name: Build daemon binary
        working-directory: server
        run: bun build src/daemon.ts --compile --target ${{ matrix.target }} --outfile ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: server/${{ matrix.artifact }}

  release:
    name: Create Release
    needs: [build-cli, build-daemon]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          # Every artifact is uploaded under a dir matching its filename.
          cp artifacts/tmpo-darwin-arm64/tmpo-darwin-arm64 release/
          cp artifacts/tmpo-darwin-x64/tmpo-darwin-x64 release/
          cp artifacts/tmpo-linux-x64/tmpo-linux-x64 release/
          cp artifacts/tmpo-linux-arm64/tmpo-linux-arm64 release/
          cp artifacts/tmpod-darwin-arm64/tmpod-darwin-arm64 release/
          cp artifacts/tmpod-darwin-x64/tmpod-darwin-x64 release/
          cp artifacts/tmpod-linux-x64/tmpod-linux-x64 release/
          cp artifacts/tmpod-linux-arm64/tmpod-linux-arm64 release/
          chmod +x release/*

      - name: Generate SHA256SUMS
        working-directory: release
        run: sha256sum * > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/tmpo-darwin-arm64
            release/tmpo-darwin-x64
            release/tmpo-linux-x64
            release/tmpo-linux-arm64
            release/tmpod-darwin-arm64
            release/tmpod-darwin-x64
            release/tmpod-linux-x64
            release/tmpod-linux-arm64
            release/SHA256SUMS
  update-homebrew:
    name: Update Homebrew Tap
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download SHA256SUMS
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Compute checksums
        id: checksums
        working-directory: artifacts
        run: |
          sha256() { sha256sum "$1" | awk '{print $1}'; }
          echo "tmpo_darwin_arm64=$(sha256 tmpo-darwin-arm64/tmpo-darwin-arm64)" >> "$GITHUB_OUTPUT"
          echo "tmpo_darwin_x64=$(sha256 tmpo-darwin-x64/tmpo-darwin-x64)" >> "$GITHUB_OUTPUT"
          echo "tmpo_linux_x64=$(sha256 tmpo-linux-x64/tmpo-linux-x64)" >> "$GITHUB_OUTPUT"
          echo "tmpo_linux_arm64=$(sha256 tmpo-linux-arm64/tmpo-linux-arm64)" >> "$GITHUB_OUTPUT"
          echo "tmpod_darwin_arm64=$(sha256 tmpod-darwin-arm64/tmpod-darwin-arm64)" >> "$GITHUB_OUTPUT"
          echo "tmpod_darwin_x64=$(sha256 tmpod-darwin-x64/tmpod-darwin-x64)" >> "$GITHUB_OUTPUT"
          echo "tmpod_linux_x64=$(sha256 tmpod-linux-x64/tmpod-linux-x64)" >> "$GITHUB_OUTPUT"
          echo "tmpod_linux_arm64=$(sha256 tmpod-linux-arm64/tmpod-linux-arm64)" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          REPO="jasonkatz/homebrew-tap"

          # Generate the formula
          cat > tmpo.rb <<FORMULA
          class Tmpo < Formula
            desc "Autonomous software delivery pipeline"
            homepage "https://github.com/jasonkatz/tmpo"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/jasonkatz/tmpo/releases/download/v${VERSION}/tmpo-darwin-arm64"
                sha256 "${{ steps.checksums.outputs.tmpo_darwin_arm64 }}"

                resource "tmpod" do
                  url "https://github.com/jasonkatz/tmpo/releases/download/v${VERSION}/tmpod-darwin-arm64"
                  sha256 "${{ steps.checksums.outputs.tmpod_darwin_arm64 }}"
                end
              else
                url "https://github.com/jasonkatz/tmpo/releases/download/v${VERSION}/tmpo-darwin-x64"
                sha256 "${{ steps.checksums.outputs.tmpo_darwin_x64 }}"

                resource "tmpod" do
                  url "https://github.com/jasonkatz/tmpo/releases/download/v${VERSION}/tmpod-darwin-x64"
                  sha256 "${{ steps.checksums.outputs.tmpod_darwin_x64 }}"
                end
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/jasonkatz/tmpo/releases/download/v${VERSION}/tmpo-linux-arm64"
                sha256 "${{ steps.checksums.outputs.tmpo_linux_arm64 }}"

                resource "tmpod" do
                  url "https://github.com/jasonkatz/tmpo/releases/download/v${VERSION}/tmpod-linux-arm64"
                  sha256 "${{ steps.checksums.outputs.tmpod_linux_arm64 }}"
                end
              else
                url "https://github.com/jasonkatz/tmpo/releases/download/v${VERSION}/tmpo-linux-x64"
                sha256 "${{ steps.checksums.outputs.tmpo_linux_x64 }}"

                resource "tmpod" do
                  url "https://github.com/jasonkatz/tmpo/releases/download/v${VERSION}/tmpod-linux-x64"
                  sha256 "${{ steps.checksums.outputs.tmpod_linux_x64 }}"
                end
              end
            end

            def install
              bin.install stable.url.split("/").last => "tmpo"
              resource("tmpod").stage do
                bin.install Dir["tmpod-*"].first => "tmpod"
              end
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/tmpo --version")
            end
          end
          FORMULA

          # Push to tap repo (will fail gracefully if tap repo doesn't exist yet)
          gh api repos/${REPO}/contents/Formula/tmpo.rb \
            --method PUT \
            --field message="Update tmpo to ${VERSION}" \
            --field content="$(base64 -w0 tmpo.rb)" \
            --field sha="$(gh api repos/${REPO}/contents/Formula/tmpo.rb --jq '.sha' 2>/dev/null || echo '')" \
            2>/dev/null || echo "::warning::Could not update Homebrew tap. Ensure jasonkatz/homebrew-tap exists and HOMEBREW_TAP_TOKEN has access."
