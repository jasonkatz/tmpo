name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-cli:
    name: Build CLI (${{ matrix.target }})
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: tmpo-darwin-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: tmpo-darwin-x64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: tmpo-linux-x64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: tmpo-linux-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build CLI
        working-directory: cli
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: cp cli/target/${{ matrix.target }}/release/tmpo ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  build-daemon:
    name: Build Daemon (all targets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"
          cache-dependency-path: client/yarn.lock

      - name: Build client
        working-directory: client
        run: |
          yarn install --frozen-lockfile
          yarn build

      - name: Copy client assets
        run: |
          mkdir -p server/public
          cp -r client/dist/* server/public/

      - name: Install server dependencies
        working-directory: server
        run: bun install

      - name: Build daemon binaries
        working-directory: server
        run: |
          bun build src/daemon.ts --compile --target bun-darwin-arm64 --outfile tmpod-darwin-arm64
          bun build src/daemon.ts --compile --target bun-darwin-x64 --outfile tmpod-darwin-x64
          bun build src/daemon.ts --compile --target bun-linux-x64 --outfile tmpod-linux-x64
          bun build src/daemon.ts --compile --target bun-linux-arm64 --outfile tmpod-linux-arm64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tmpod-binaries
          path: |
            server/tmpod-darwin-arm64
            server/tmpod-darwin-x64
            server/tmpod-linux-x64
            server/tmpod-linux-arm64

  release:
    name: Create Release
    needs: [build-cli, build-daemon]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          # CLI binaries (each in its own directory from upload-artifact)
          cp artifacts/tmpo-darwin-arm64/tmpo-darwin-arm64 release/
          cp artifacts/tmpo-darwin-x64/tmpo-darwin-x64 release/
          cp artifacts/tmpo-linux-x64/tmpo-linux-x64 release/
          cp artifacts/tmpo-linux-arm64/tmpo-linux-arm64 release/
          # Daemon binaries
          cp artifacts/tmpod-binaries/tmpod-darwin-arm64 release/
          cp artifacts/tmpod-binaries/tmpod-darwin-x64 release/
          cp artifacts/tmpod-binaries/tmpod-linux-x64 release/
          cp artifacts/tmpod-binaries/tmpod-linux-arm64 release/
          # Make all binaries executable
          chmod +x release/*

      - name: Generate SHA256SUMS
        working-directory: release
        run: sha256sum * > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/tmpo-darwin-arm64
            release/tmpo-darwin-x64
            release/tmpo-linux-x64
            release/tmpo-linux-arm64
            release/tmpod-darwin-arm64
            release/tmpod-darwin-x64
            release/tmpod-linux-x64
            release/tmpod-linux-arm64
            release/SHA256SUMS
  update-homebrew:
    name: Update Homebrew Tap
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download SHA256SUMS
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Compute checksums
        id: checksums
        working-directory: artifacts
        run: |
          sha256() { sha256sum "$1" | awk '{print $1}'; }
          echo "tmpo_darwin_arm64=$(sha256 tmpo-darwin-arm64/tmpo-darwin-arm64)" >> "$GITHUB_OUTPUT"
          echo "tmpo_darwin_x64=$(sha256 tmpo-darwin-x64/tmpo-darwin-x64)" >> "$GITHUB_OUTPUT"
          echo "tmpo_linux_x64=$(sha256 tmpo-linux-x64/tmpo-linux-x64)" >> "$GITHUB_OUTPUT"
          echo "tmpo_linux_arm64=$(sha256 tmpo-linux-arm64/tmpo-linux-arm64)" >> "$GITHUB_OUTPUT"
          echo "tmpod_darwin_arm64=$(sha256 tmpod-binaries/tmpod-darwin-arm64)" >> "$GITHUB_OUTPUT"
          echo "tmpod_darwin_x64=$(sha256 tmpod-binaries/tmpod-darwin-x64)" >> "$GITHUB_OUTPUT"
          echo "tmpod_linux_x64=$(sha256 tmpod-binaries/tmpod-linux-x64)" >> "$GITHUB_OUTPUT"
          echo "tmpod_linux_arm64=$(sha256 tmpod-binaries/tmpod-linux-arm64)" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          REPO="jasonkatz/homebrew-tap"

          # Generate the formula
          cat > tmpo.rb <<FORMULA
          class Tmpo < Formula
            desc "Autonomous software delivery pipeline"
            homepage "https://github.com/jasonkatz/tmpo"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/jasonkatz/tmpo/releases/download/v${VERSION}/tmpo-darwin-arm64"
                sha256 "${{ steps.checksums.outputs.tmpo_darwin_arm64 }}"

                resource "tmpod" do
                  url "https://github.com/jasonkatz/tmpo/releases/download/v${VERSION}/tmpod-darwin-arm64"
                  sha256 "${{ steps.checksums.outputs.tmpod_darwin_arm64 }}"
                end
              else
                url "https://github.com/jasonkatz/tmpo/releases/download/v${VERSION}/tmpo-darwin-x64"
                sha256 "${{ steps.checksums.outputs.tmpo_darwin_x64 }}"

                resource "tmpod" do
                  url "https://github.com/jasonkatz/tmpo/releases/download/v${VERSION}/tmpod-darwin-x64"
                  sha256 "${{ steps.checksums.outputs.tmpod_darwin_x64 }}"
                end
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/jasonkatz/tmpo/releases/download/v${VERSION}/tmpo-linux-arm64"
                sha256 "${{ steps.checksums.outputs.tmpo_linux_arm64 }}"

                resource "tmpod" do
                  url "https://github.com/jasonkatz/tmpo/releases/download/v${VERSION}/tmpod-linux-arm64"
                  sha256 "${{ steps.checksums.outputs.tmpod_linux_arm64 }}"
                end
              else
                url "https://github.com/jasonkatz/tmpo/releases/download/v${VERSION}/tmpo-linux-x64"
                sha256 "${{ steps.checksums.outputs.tmpo_linux_x64 }}"

                resource "tmpod" do
                  url "https://github.com/jasonkatz/tmpo/releases/download/v${VERSION}/tmpod-linux-x64"
                  sha256 "${{ steps.checksums.outputs.tmpod_linux_x64 }}"
                end
              end
            end

            def install
              bin.install stable.url.split("/").last => "tmpo"
              resource("tmpod").stage do
                bin.install Dir["tmpod-*"].first => "tmpod"
              end
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/tmpo --version")
            end
          end
          FORMULA

          # Push to tap repo (will fail gracefully if tap repo doesn't exist yet)
          gh api repos/${REPO}/contents/Formula/tmpo.rb \
            --method PUT \
            --field message="Update tmpo to ${VERSION}" \
            --field content="$(base64 -w0 tmpo.rb)" \
            --field sha="$(gh api repos/${REPO}/contents/Formula/tmpo.rb --jq '.sha' 2>/dev/null || echo '')" \
            2>/dev/null || echo "::warning::Could not update Homebrew tap. Ensure jasonkatz/homebrew-tap exists and HOMEBREW_TAP_TOKEN has access."
